server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # index.html은 항상 최신으로 — 재배포 직후 브라우저가 옛 번들을 물고 있지 않게
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # 해시 붙은 정적 자산은 내용이 바뀌면 파일명도 바뀌므로 길게 캐시해도 안전
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
